services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ocrbridge-api
    env_file:
      - ../.env
    environment:
      # Use mounted credentials file path inside container
      GOOGLE_SHEETS_CREDENTIALS: /run/secrets/credentials.json
    volumes:
      - ../credentials.json:/run/secrets/credentials.json:ro
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ocrbridge-bot
    env_file:
      - ../.env
    environment:
      GOOGLE_SHEETS_CREDENTIALS: /run/secrets/credentials.json
    volumes:
      - ../credentials.json:/run/secrets/credentials.json:ro
    command: ["python", "-m", "src.channels.telegram.bot"]
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
